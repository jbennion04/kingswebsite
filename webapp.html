<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WebApp - Interest Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; }
        .calc-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 50px; }
        .result-box { background: #f8f9fa; padding: 20px; border-left: 5px solid #198754; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 calc-card">
                <h2 class="text-center mb-4">Financial Interest Calculator</h2>
                <p class="text-muted text-center">AI-Assisted Accounting Tool</p>
                
                <div class="mb-3">
                    <label class="form-label">Principal Amount ($)</label>
                    <input type="number" id="principal" class="form-control" placeholder="e.g. 10000">
                </div>
                <div class="mb-3">
                    <label class="form-label">Annual Interest Rate (%)</label>
                    <input type="number" id="rate" class="form-control" placeholder="e.g. 5">
                </div>
                <div class="mb-3">
                    <label class="form-label">Period (Years)</label>
                    <input type="number" id="years" class="form-control" placeholder="e.g. 4">
                </div>
                
                <button class="btn btn-success w-100" onclick="calculateInterest()">Calculate Monthly Payment</button>

                <div id="results" class="result-box d-none">
                    <h5>Results:</h5>
                    <p>Monthly Payment: <strong id="monthlyPayment"></strong></p>
                    <p>Total Interest: <strong id="totalInterest"></strong></p>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="btn btn-link text-decoration-none">← Back to Portal</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateInterest() {
            const P = parseFloat(document.getElementById('principal').value);
            const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const n = parseFloat(document.getElementById('years').value) * 12;

            if (P && r && n) {
                // Amortization Formula: M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1 ]
                const x = Math.pow(1 + r, n);
                const monthly = (P * x * r) / (x - 1);
                const totalInt = (monthly * n) - P;

                document.getElementById('monthlyPayment').innerText = "$" + monthly.toFixed(2);
                document.getElementById('totalInterest').innerText = "$" + totalInt.toFixed(2);
                document.getElementById('results').classList.remove('d-none');
            } else {
                alert("Please enter all values correctly, King.");
            }
        }
    </script>
</body>
</html>
