<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Analytics - Tableau</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1>Interactive Financial Analysis</h1>
        <p class="text-muted">Demonstrating data visualization proficiency for the BYU Accounting program.</p>
        <hr>
        
        <div class='tableauPlaceholder' id='viz1713135000000' style='position: relative; width: 100%; height: 600px;'>
            <object class='tableauViz' style='display:none;'>
                <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' /> 
                <param name='name' value='FinanceProfitabilityandGrowthRateAnalysis/Dashboard1' />
                <param name='tabs' value='no' /><param name='toolbar' value='yes' />
            </object>
        </div>
        <script type='text/javascript'>
            var divElement = document.getElementById('viz1713135000000');
            var vizElement = divElement.getElementsByTagName('object')[0];
            vizElement.style.width='100%';vizElement.style.height='600px';
            var scriptElement = document.createElement('script');
            scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
            vizElement.parentNode.insertBefore(scriptElement, vizElement);
        </script>

        <div class="mt-4">
            <a href="index.html" class="btn btn-primary">Return to Home Portal</a>
        </div>
    </div>
</body>
</html>
